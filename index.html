<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hardware PM Dashboard — 硬體專案管理儀表板</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            slate: {
              750: '#293548',
              850: '#172033',
            }
          }
        }
      }
    }

  <style>
    /* Base */
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f1f5f9; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Card */
    .card {
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      transition: box-shadow .25s ease, transform .25s ease;
    }
    .card:hover {
      box-shadow: 0 10px 25px rgba(0,0,0,.08), 0 4px 10px rgba(0,0,0,.04);
      transform: translateY(-2px);
    }

    /* Timeline */
    .timeline-line {
      position: absolute;
      left: 17px;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, #22c55e 0%, #eab308 35%, #94a3b8 70%, #94a3b8 100%);
      border-radius: 2px;
    }
    .timeline-item {
      position: relative;
      padding-left: 48px;
      padding-bottom: 28px;
    }
    .timeline-item:last-child { padding-bottom: 0; }
    
    .timeline-dot {
      position: absolute;
      left: 10px;
      top: 4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px currentColor, 0 2px 6px rgba(0,0,0,.12);
      z-index: 1;
    }

    .dot-pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 2px currentColor, 0 2px 6px rgba(0,0,0,.12); }
      50% { box-shadow: 0 0 0 2px currentColor, 0 0 0 6px rgba(234,179,8,.25), 0 2px 6px rgba(0,0,0,.12); }
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 9999px;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .02em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Tab Button */
    .tab-btn {
      position: relative;
      padding: 8px 20px;
      font-size: .82rem;
      font-weight: 600;
      color: #64748b;
      border-radius: .5rem;
      transition: all .25s ease;
      cursor: pointer;
      border: none;
      background: transparent;
    }
    .tab-btn:hover { color: #334155; background: #f1f5f9; }
    .tab-btn.active {
      color: #fff;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      box-shadow: 0 2px 8px rgba(99,102,241,.35);
    }

    /* Metric Card */
    .metric-card {
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      border: 1px solid #e2e8f0;
      border-radius: .75rem;
      padding: 20px;
      text-align: center;
      transition: all .25s ease;
    }

    /* Layout */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 1024px) {
      .dashboard-grid { grid-template-columns: 1fr; }
    }

    .bom-progress-track {
      height: 8px;
      border-radius: 4px;
      background: #e2e8f0;
      overflow: hidden;
      margin-top: 10px;
    }
    .bom-progress-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 1s ease;
    }

    .header-gradient {
      background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #1e293b 100%);
    }

    /* Input styling for Edit Mode */
    .edit-input {
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: inherit;
      width: 100%;
      background: #f8fafc;
      color: #0f172a;
    }
    .edit-input:focus {
      outline: none;
      border-color: #6366f1;
      background: #fff;
    }
    select.edit-input {
      appearance: auto;
    }

    /* Accordion */
    .issue-row.expanded {
      background-color: #f8fafc;
    }
    .expand-icon {
      transition: transform 0.2s ease;
    }
    .issue-row.expanded .expand-icon {
      transform: rotate(180deg);
    }
    .issue-detail-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-in-out, padding 0.3s ease-in-out;
    }
    .issue-detail-content.show {
      max-height: 300px;
      padding-top: 0.75rem;
      padding-bottom: 0.75rem;
    }
  </style>
</head>

        </div>

        <!-- Yield Panel -->

            <!-- Rendered via JS -->

    </div>

    // --- Meeting Notes ---
    function renderMeetingNotes() {
      const container = document.getElementById('notes-container');
      let html = '';
      if (isEditMode) {
        html += `<div class="mb-3 flex items-center justify-between">

          html += `
            <div class="flex items-center gap-2">

            </div>
          `;
        });
        html += `</div>`;
        html += `<button onclick="addNote()" class="mt-3 text-xs text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-md hover:bg-indigo-100 font-semibold transition-colors">+ Add Action Item</button>`;
      } else {
        html += `
          <div class="flex items-center justify-between mb-3 border-b border-slate-100 pb-2">
            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Action Items Tracking</span>
            <span class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-md shadow-sm">${appData.meetingNotes.date}</span>
          </div>
          <div class="space-y-1.5 mt-2 overflow-y-auto max-h-[180px] pr-2">
        `;
        appData.meetingNotes.items.forEach((item, idx) => {

    function commitEditInputs() {
      const inputs = document.querySelectorAll('input[data-path], select[data-path], textarea[data-path]');
      inputs.forEach(input => {
        const path = input.getAttribute('data-path');
        let val = input.value;
        if (input.type === 'number') val = parseFloat(val) || 0;
        setNestedValue(appData, path, val);
      });
    }

    // --- Health Score ---
    function renderHealthScore() {
      const avgProgress = appData.progress.reduce((sum, p) => {
        const pct = p.tasksTotal > 0 ? (p.tasksCompleted / p.tasksTotal) * 100 : 0;
        return sum + pct;
      }, 0) / appData.progress.length;
      const blockedCount = appData.issues.filter(i => i.status === 'Blocked').length;
      
      const progressScore = avgProgress * 0.70;
      const issuesScore = Math.max(0, 30 - (blockedCount * 10)); 
      const totalScore = Math.round(progressScore + issuesScore);
      
      let statusText = '';
      let colorClass = '';
      
      if (totalScore >= 85) { statusText = 'Excellent'; colorClass = 'text-emerald-400'; }
      else if (totalScore >= 70) { statusText = 'Good'; colorClass = 'text-teal-400'; }
      else if (totalScore >= 50) { statusText = 'At Risk'; colorClass = 'text-amber-400'; }
      else { statusText = 'Critical'; colorClass = 'text-red-400'; }
      
      const container = document.getElementById('health-score-container');
      if(container) {
        container.innerHTML = `
          <div class="flex flex-col items-end" title="Calculated from Progress (70%) and Blocked Issues (30%)">
            <span class="text-[0.65rem] font-bold text-slate-300 uppercase tracking-wider mb-0.5">Project Health</span>
            <div class="flex items-baseline gap-1.5">
              <span class="text-xl font-extrabold ${colorClass} leading-none">${totalScore}</span>
              <span class="text-xs font-semibold ${colorClass}">${statusText}</span>
            </div>
          </div>
        `;
      }
    }

    // --- Chart.js ---
    function renderChart() {
      const ctx = document.getElementById('progressChart').getContext('2d');
      const depts = appData.progress.map(p => p.dept);
      
      const vals = appData.progress.map(p => {
        if(p.tasksTotal === 0) return 0;
        return Math.round((p.tasksCompleted / p.tasksTotal) * 100);
      });
      
      const barColors = ['rgba(20, 184, 166, 0.85)', 'rgba(249, 115, 22, 0.85)', 'rgba(99, 102, 241, 0.85)', 'rgba(16, 185, 129, 0.85)', 'rgba(139, 92, 246, 0.85)'];
      const barBgColors = barColors.map(c => c.replace('0.85', '0.12'));

      if (chartInstance) { chartInstance.destroy(); }

      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: depts,
          datasets: [{
            data: vals, backgroundColor: barColors, borderRadius: 6, barThickness: 28
          }, {
            data: vals.map(v => 100 - v), backgroundColor: barBgColors, borderRadius: 6, barThickness: 28
          }]
        },
        options: {
          indexAxis: 'y', responsive: true, maintainAspectRatio: false,
          onClick: (e, elements) => {
            if (elements.length > 0) {
              showDeptDetail(elements[0].index);
            }
          },
          onHover: (event, chartElement) => {
            event.native.target.style.cursor = chartElement[0] ? 'pointer' : 'default';
          },
          plugins: { legend: { display: false }, tooltip: { filter: i => i.datasetIndex === 0 } },
          scales: { x: { stacked: true, max: 100, display: false }, y: { stacked: true, grid: { display: false }, border: {display: false} } }
        },
        plugins: [{
          id: 'valLabels',
          afterDatasetsDraw(chart) {
            const { ctx: c, data } = chart;
            const meta = chart.getDatasetMeta(0);
            c.save();
            meta.data.forEach((bar, i) => {
              c.fillStyle = '#1e293b'; c.font = 'bold 11px Inter'; c.textBaseline = 'middle';
              c.fillText(`${data.datasets[0].data[i]}%`, bar.x + 8, bar.y);
            });
            c.restore();
          }
        }]
      });
    }

    function setNestedValue(obj, path, value) {
      const keys = path.split('.');
      let current = obj;
      for (let i = 0; i < keys.length - 1; i++) {
        current = current[keys[i]];
      }
      current[keys[keys.length - 1]] = value;
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      commitEditInputs();

      localStorage.setItem('pmDashboardData', JSON.stringify(appData));
      await syncWithGoogleSheets(appData);

      isEditMode = false;
      document.getElementById('saveBtn').classList.add('hidden');
      document.getElementById('toggleEditBtn').classList.replace('bg-amber-500', 'bg-white/10');
      document.getElementById('toggleEditBtn').classList.remove('border-amber-400');
      document.getElementById('toggleEditBtn').innerHTML = '✏️ Edit Mode';
      renderAll();
      
      const originalText = document.getElementById('toggleEditBtn').innerHTML;
      document.getElementById('toggleEditBtn').innerHTML = '✅ Saved!';
      setTimeout(() => document.getElementById('toggleEditBtn').innerHTML = originalText, 2000);
    });

    // Tab Switching
    function switchTab(tab) {
      const panels = ['bom', 'yield', 'notes'];
      panels.forEach(p => {
        const panelEl = document.getElementById(`panel-${p}`);
        const tabEl = document.getElementById(`tab-${p}`);
        if(panelEl && tabEl) {
          if(p === tab) {
            panelEl.classList.remove('hidden');
            tabEl.classList.add('active');
          } else {
            panelEl.classList.add('hidden');
            tabEl.classList.remove('active');
          }
        }
      });
    }

    // Set Time
    const now = new Date();
    document.getElementById('headerDate').textContent = now.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
    document.getElementById('footerTime').textContent = now.toLocaleString();

    // Initial Render
    renderAll();
  </script>
</body>
</html>
